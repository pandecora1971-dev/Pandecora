upstream nextjs {
    server app:3000;
    keepalive 64;
}

# Redirect bare HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────────────────────
    # Replace with your real certificate paths (e.g. from Certbot / Let's Encrypt)
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers (supplement those set by Next.js middleware) ─────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Proxy to Next.js ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Next.js static assets — long-lived cache ──────────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Local file uploads (when STORAGE_ADAPTER=local) ──────────────────────
    location /uploads/ {
        alias  /app/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        # Prevent direct execution of uploaded files
        add_header Content-Disposition "attachment";
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml image/svg+xml;

    # ── Rate limiting (supplement app-level limiting) ─────────────────────────
    # Define zone in http block if needed:
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    # location /api/ {
    #     limit_req zone=api burst=10 nodelay;
    #     proxy_pass http://nextjs;
    # }
}
